name: Windows release retry

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-release-retry.yml"

jobs:
  publish-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build and publish Windows artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop-app
          tagName: v__VERSION__
          releaseName: Codex Weekly Quota v__VERSION__
          releaseBody: Download the installer for your platform. The in-app updater uses the signed latest.json manifest from this release.
          releaseDraft: false
          prerelease: false
