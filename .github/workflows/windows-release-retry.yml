name: Windows release retry

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-release-retry.yml"

jobs:
  publish-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build signed Windows artifacts
        working-directory: desktop-app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          & npm run tauri build *> windows-build.log
          $buildExitCode = $LASTEXITCODE
          if ($buildExitCode -ne 0) {
            Get-Content windows-build.log -Tail 160 |
              Where-Object { $_ -notmatch 'TAURI_SIGNING|secret' } |
              Set-Content windows-build-public.log -Encoding utf8
            gh release upload v0.1.4 windows-build-public.log --clobber --repo sin518/codex-weekly-quota
            exit $buildExitCode
          }
          Write-Host "Windows build completed successfully."

      - name: Upload Windows artifacts and merge updater manifest
        working-directory: desktop-app
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-windows.ps1
