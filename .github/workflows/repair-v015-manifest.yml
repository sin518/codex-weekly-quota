name: Repair v0.1.5 updater manifest

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/repair-v015-manifest.yml"

jobs:
  repair-manifest:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Merge existing Windows assets into latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="sin518/codex-weekly-quota"
          tag="v0.1.5"
          gh api "repos/$repo/releases/tags/$tag" > release.json

          msi_url=$(jq -r '.assets[] | select(.name | endswith("_x64_en-US.msi")) | .url' release.json)
          msi_sig_url=$(jq -r '.assets[] | select(.name | endswith("_x64_en-US.msi.sig")) | .browser_download_url' release.json)
          nsis_url=$(jq -r '.assets[] | select(.name | endswith("_x64-setup.exe")) | .url' release.json)
          nsis_sig_url=$(jq -r '.assets[] | select(.name | endswith("_x64-setup.exe.sig")) | .browser_download_url' release.json)

          test -n "$msi_url" && test -n "$msi_sig_url"
          test -n "$nsis_url" && test -n "$nsis_sig_url"
          curl -fsSL "$msi_sig_url" -o msi.sig
          curl -fsSL "$nsis_sig_url" -o nsis.sig
          curl -fsSL "https://github.com/$repo/releases/download/$tag/latest.json" -o latest.json

          msi_signature=$(tr -d '\r\n' < msi.sig)
          nsis_signature=$(tr -d '\r\n' < nsis.sig)
          jq \
            --arg msi_url "$msi_url" \
            --arg msi_signature "$msi_signature" \
            --arg nsis_url "$nsis_url" \
            --arg nsis_signature "$nsis_signature" \
            '.platforms["windows-x86_64"] = {url: $msi_url, signature: $msi_signature}
             | .platforms["windows-x86_64-msi"] = {url: $msi_url, signature: $msi_signature}
             | .platforms["windows-x86_64-nsis"] = {url: $nsis_url, signature: $nsis_signature}' \
            latest.json > latest.fixed.json

          gh release upload "$tag" latest.fixed.json#latest.json --clobber --repo "$repo"
          gh release delete-asset v0.1.4 windows-build-public.log --yes --repo "$repo" || true
