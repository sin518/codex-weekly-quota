name: Windows build diagnostic

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-diagnostic.yml"

jobs:
  diagnose-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Capture Windows build output
        id: build
        continue-on-error: true
        working-directory: desktop-app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          npm run tauri build 2>&1 | Tee-Object -FilePath windows-build.log
          "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Write diagnostic summary
        if: always()
        working-directory: desktop-app
        shell: pwsh
        run: |
          "## Windows build result" >> $env:GITHUB_STEP_SUMMARY
          "Exit code: ${{ steps.build.outputs.exit_code }}" >> $env:GITHUB_STEP_SUMMARY
          '```text' >> $env:GITHUB_STEP_SUMMARY
          Get-Content windows-build.log -Tail 120 |
            Where-Object { $_ -notmatch 'TAURI_SIGNING|secret' } |
            Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' >> $env:GITHUB_STEP_SUMMARY

      - name: Preserve failure status
        if: steps.build.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
